name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: echo "Running ESLint..."
      - run: |
          if [ -f "FAIL_LINT" ]; then
            echo "::error::ESLint: 4 errors found in src/middleware/rateLimit.ts"
            exit 1
          fi
          echo "✓ No lint errors"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: echo "Running Jest test suite..."
      - run: |
          if [ -f "FAIL_TESTS" ]; then
            echo "::error::FAIL: 3 tests failed"
            echo "  ✗ RateLimitHandler > should handle unauthenticated requests"
            echo "  ✗ RateLimitHandler > should not throw on missing userId"
            echo "  ✗ Integration > POST /api/v2/payments returns 200"
            exit 1
          fi
          echo "✓ 214 tests passed (0 failed)"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: echo "tsc --noEmit"
      - run: echo "✓ Build succeeded"
